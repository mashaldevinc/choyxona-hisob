kind = "mobile"
previewPath = "/"
title = "Choyxona Hisob"
version = "1.0.0"
id = "artifacts/choyxona-hisob"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20881

[services.development]
run = "pnpm --filter @workspace/choyxona-hisob run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/choyxona-hisob", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/choyxona-hisob", "run", "serve" ]

[services.env]
PORT = "20881"
BASE_PATH = "/"
